<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Menú Semanal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:#FBF5EC; --paper-2:#F3EADA; --ink:#1E241F; --ink-soft:#5A6157;
    --sage:#16A368; --sage-light:#46C28C; --sage-pale:#D2F2E1;
    --coral:#FF6A3D; --coral-pale:#FFDBCC; --gold:#F4A52C;
    --blue:#2E8DBE; --blue-pale:#D3E9F5; --plum:#C84E9C; --plum-pale:#F7DBEF;
    --line:#E7DCC8; --white:#FFFFFF; --radius:18px;
    --shadow:0 1px 2px rgba(30,36,31,0.05), 0 6px 18px rgba(30,36,31,0.08);
  }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; background:var(--paper); color:var(--ink);
    font-family:'Manrope',sans-serif; -webkit-font-smoothing:antialiased; overscroll-behavior-y:none; }
  #root { max-width:480px; margin:0 auto; min-height:100vh; background:var(--paper); position:relative; box-shadow:0 0 40px rgba(0,0,0,0.06); }
  button { font-family:inherit; cursor:pointer; }
  button:focus-visible, [role="button"]:focus-visible, input:focus-visible { outline:2px solid var(--sage); outline-offset:2px; }
  .display { font-family:'Fraunces',serif; letter-spacing:-0.01em; }

  .app-header { position:sticky; top:0; z-index:20; background:var(--paper); padding:20px 20px 0; border-bottom:1px solid var(--line); }
  .header-top { display:flex; align-items:flex-start; justify-content:space-between; }
  .app-header .eyebrow { font-size:12px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--sage); margin:0 0 4px; }
  .app-header h1 { font-size:25px; margin:0; font-weight:600; }
  .cart-btn { background:var(--ink); color:var(--paper); border:none; border-radius:14px; width:46px; height:46px; font-size:20px;
    display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:var(--shadow); }
  .cart-btn:active { transform:scale(0.94); }
  .nav-tabs { display:flex; gap:18px; margin-top:14px; }
  .nav-tabs button { background:none; border:none; padding:8px 0 12px; font-size:15px; font-weight:700; color:var(--ink-soft); border-bottom:3px solid transparent; }
  .nav-tabs button.active { color:var(--ink); border-bottom-color:var(--sage); }

  .content { padding:18px 20px 40px; }

  .week-pager { display:flex; gap:8px; margin-bottom:18px; background:var(--paper-2); padding:5px; border-radius:14px; }
  .week-pager button { flex:1; padding:11px; border-radius:10px; border:none; background:transparent; font-size:13.5px; font-weight:700; color:var(--ink-soft); }
  .week-pager button.active { background:var(--white); color:var(--ink); box-shadow:var(--shadow); }

  .week-subhead { display:flex; align-items:center; justify-content:space-between; margin:4px 0 14px; padding-bottom:8px; border-bottom:2px solid var(--ink); }
  .week-subhead .wk-name { font-family:'Fraunces',serif; font-size:20px; font-weight:600; }
  .week-subhead .wk-range { font-size:12px; color:var(--ink-soft); font-weight:600; }
  .regen-btn { background:var(--white); border:1px solid var(--line); border-radius:10px; padding:7px 11px; font-size:12px; font-weight:700; color:var(--ink-soft); display:flex; align-items:center; gap:5px; }
  .regen-btn:hover { background:var(--sage-pale); }

  .day-block { margin-bottom:16px; border-radius:16px; padding:2px; transition:background 0.2s; }
  .day-block.is-today { background:var(--sage-pale); padding:10px 10px 4px; box-shadow:inset 0 0 0 2px var(--sage); }
  .day-block.is-past { opacity:0.62; }
  .day-block.is-past .meal-card { background:var(--paper-2); }
  .day-heading { display:flex; align-items:center; gap:8px; margin-bottom:8px; padding-left:2px; }
  .day-heading .day-name { font-family:'Fraunces',serif; font-size:17px; font-weight:600; text-transform:capitalize; }
  .day-heading .day-date { font-size:11.5px; color:var(--ink-soft); font-weight:600; }
  .day-heading .today-pill { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:0.06em; background:var(--sage); color:#fff; padding:2px 8px; border-radius:20px; }
  .day-heading .past-pill { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-soft); background:var(--paper-2); padding:2px 8px; border-radius:20px; }
  .meal-row { display:flex; gap:10px; }

  .meal-card { flex:1; background:var(--white); border:1px solid var(--line); border-radius:var(--radius); padding:10px 11px; text-align:left;
    box-shadow:var(--shadow); display:flex; flex-direction:column; gap:5px; min-height:118px; position:relative; }
  .meal-card.office { border-color:var(--blue); box-shadow:0 0 0 1px var(--blue), var(--shadow); }
  .card-head { display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
  .slot-label { font-size:10px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; color:var(--sage-light); }
  .office-toggle { background:transparent; border:1px solid var(--line); border-radius:8px; width:26px; height:22px; font-size:12px; display:flex; align-items:center; justify-content:center; padding:0; opacity:0.5; }
  .office-toggle.on { background:var(--blue); border-color:var(--blue); opacity:1; }
  .meal-name { font-size:13.5px; font-weight:700; line-height:1.25; cursor:pointer; }
  .meal-meta { display:flex; flex-wrap:wrap; gap:4px; font-size:10px; color:var(--ink-soft); font-weight:600; align-items:center; }
  .tag { padding:1px 6px; border-radius:6px; font-weight:700; font-size:10px; }
  .tag-fiber { background:var(--sage-pale); color:var(--sage); }
  .tag-tupper { background:var(--blue-pale); color:var(--blue); }
  .tag-indiv { background:var(--plum-pale); color:var(--plum); }
  .tag-fish { background:#D7E8E6; color:#2B6E66; }
  .card-actions { margin-top:auto; display:flex; gap:6px; padding-top:6px; border-top:1px solid var(--paper-2); }
  .mini-btn { flex:1; background:var(--white); border:1px solid var(--line); border-radius:9px; padding:6px 4px; font-size:11px; font-weight:700; color:var(--ink-soft); display:flex; align-items:center; justify-content:center; gap:3px; }
  .mini-btn.done { background:var(--sage); border-color:var(--sage); color:var(--white); }
  .mini-btn.diners-on { background:var(--plum); border-color:var(--plum); color:var(--white); }
  .meal-card.is-empty { border-style:dashed; background:rgba(255,255,255,0.4); justify-content:center; }
  .meal-card.is-empty .meal-name { color:var(--ink-soft); font-weight:600; }
  .meal-card.is-eatout { background:var(--coral-pale); border-color:transparent; }
  .meal-card.is-eatout .slot-label { color:#B5512F; }
  .meal-card.is-eatout .meal-name { color:#7A3920; }
  .meal-card.is-custom { background:#F1EEE3; }

  .create-btn { width:100%; margin-top:14px; padding:16px; background:var(--sage); color:var(--white); border:none; border-radius:var(--radius); font-size:15px; font-weight:700; display:flex; align-items:center; justify-content:center; gap:8px; box-shadow:var(--shadow); }
  .create-btn:hover { background:#344A39; }
  .create-btn.disabled { background:var(--paper-2); color:var(--ink-soft); cursor:default; box-shadow:none; }

  .overlay { position:fixed; inset:0; z-index:50; display:flex; justify-content:center; }
  .overlay-backdrop { position:absolute; inset:0; background:rgba(20,22,18,0.45); animation:fadeIn 0.18s ease; }
  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
  @keyframes slideUp { from{transform:translateY(100%);} to{transform:translateY(0);} }
  .sheet { position:absolute; bottom:0; width:100%; max-width:480px; max-height:92vh; background:var(--paper); border-radius:26px 26px 0 0; overflow-y:auto; animation:slideUp 0.26s cubic-bezier(.2,.8,.25,1); padding-bottom:30px; }
  .sheet-handle { width:38px; height:4px; background:var(--line); border-radius:4px; margin:12px auto 6px; }
  .sheet-header { padding:4px 22px 16px; border-bottom:1px solid var(--line); }
  .sheet-header .slot-label { font-size:11px; font-weight:800; letter-spacing:0.1em; text-transform:uppercase; color:var(--sage); }
  .sheet-header h2 { font-family:'Fraunces',serif; font-size:23px; font-weight:600; margin:4px 0 0; }
  .close-btn { position:absolute; top:14px; right:16px; background:var(--white); border:1px solid var(--line); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; color:var(--ink-soft); z-index:2; }
  .badge-row { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  .badge { font-size:11px; font-weight:700; padding:3px 9px; border-radius:8px; }
  .badge.meal { background:var(--ink); color:var(--paper); }
  .badge.fiber { background:var(--sage-pale); color:var(--sage); }
  .badge.tupper { background:var(--blue-pale); color:var(--blue); }

  .macro-row { display:flex; gap:10px; padding:16px 22px 4px; }
  .macro-pill { flex:1; background:var(--white); border:1px solid var(--line); border-radius:14px; padding:10px 12px; text-align:center; }
  .macro-pill .v { font-family:'Fraunces',serif; font-size:18px; font-weight:600; display:block; }
  .macro-pill .l { font-size:9.5px; text-transform:uppercase; letter-spacing:0.05em; font-weight:700; color:var(--ink-soft); }

  .sheet-section { padding:18px 22px 0; }
  .sheet-section h3 { font-size:13px; text-transform:uppercase; letter-spacing:0.07em; font-weight:800; color:var(--ink-soft); margin:0 0 10px; }
  .note-box { border-radius:12px; padding:12px 14px; font-size:13px; line-height:1.5; }
  .note-box.ruben { background:var(--plum-pale); color:#5A3F58; }
  .note-box.tip { background:var(--sage-pale); color:var(--sage); }
  .ing-list { list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px; }
  .ing-list li { font-size:13.5px; background:var(--white); border:1px solid var(--line); border-radius:12px; padding:9px 12px; }
  .ing-name { font-weight:700; color:var(--ink); }
  .pp { display:flex; flex-direction:column; gap:2px; margin-top:4px; }
  .pp span { font-size:12px; font-weight:600; }
  .pp .me { color:var(--sage); }
  .pp .ruben { color:var(--plum); }
  .pp .ck { color:var(--ink-soft); font-weight:500; }
  .step-list { list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:14px; }
  .step-list li { display:flex; gap:12px; font-size:14px; line-height:1.5; }
  .step-num { font-family:'Fraunces',serif; font-weight:600; font-size:14px; color:var(--sage); background:var(--sage-pale); width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

  .action-row { display:flex; gap:10px; padding:20px 22px 0; }
  .action-btn { flex:1; padding:13px 8px; border-radius:14px; font-size:13px; font-weight:700; border:1px solid var(--line); background:var(--white); color:var(--ink); display:flex; align-items:center; justify-content:center; gap:6px; }
  .action-btn:hover { background:var(--sage-pale); }
  .action-btn.danger:hover { background:var(--coral-pale); }
  .action-btn.primary { background:var(--sage); color:var(--white); border-color:var(--sage); }

  .seg { display:flex; gap:6px; padding:0 22px; margin-top:12px; }
  .seg button { flex:1; padding:10px; border-radius:10px; border:1px solid var(--line); background:var(--white); font-size:12.5px; font-weight:700; color:var(--ink-soft); }
  .seg button.active { background:var(--plum); color:var(--white); border-color:var(--plum); }

  .search-input, .field-group input, .field-group textarea, .add-item-input {
    width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--line); background:var(--white); font-size:14px; color:var(--ink); font-family:inherit; }
  .search-input:focus, .field-group input:focus, .field-group textarea:focus, .add-item-input:focus { outline:none; border-color:var(--sage-light); }
  .pick-filter { display:flex; gap:6px; margin:12px 0 4px; }
  .pick-filter button { flex:1; padding:9px; border-radius:10px; border:1px solid var(--line); background:var(--white); font-size:12.5px; font-weight:700; color:var(--ink-soft); }
  .pick-filter button.active { background:var(--sage); color:var(--white); border-color:var(--sage); }
  .recipe-pick-list { display:flex; flex-direction:column; gap:8px; margin-top:12px; }
  .recipe-pick-item { display:flex; align-items:center; justify-content:space-between; background:var(--white); border:1px solid var(--line); border-radius:14px; padding:11px 14px; text-align:left; }
  .recipe-pick-item .name { font-size:13.5px; font-weight:700; margin-bottom:3px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .recipe-pick-item .meta { font-size:11px; color:var(--ink-soft); font-weight:600; }
  .mini-tag { font-size:9px; font-weight:800; padding:1px 5px; border-radius:5px; text-transform:uppercase; }
  .mini-tag.comida { background:var(--coral-pale); color:#B5512F; }
  .mini-tag.cena { background:var(--blue-pale); color:var(--blue); }
  .mini-tag.fiber { background:var(--sage-pale); color:var(--sage); }
  .mini-tag.fish { background:#D7E8E6; color:#2B6E66; }
  .eatout-btn { width:100%; margin-top:14px; padding:14px; border-radius:14px; background:var(--coral-pale); border:1px solid transparent; color:#7A3920; font-weight:700; font-size:14px; }
  .field-group { margin-bottom:14px; }
  .field-group label { display:block; font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-soft); margin-bottom:6px; }
  .empty-illustration { text-align:center; padding:24px 20px 10px; color:var(--ink-soft); font-size:14px; line-height:1.6; }

  /* shopping */
  .shop-progress { padding:14px 22px 0; }
  .shop-progress .bar { height:8px; background:var(--paper-2); border-radius:8px; overflow:hidden; }
  .shop-progress .fill { height:100%; background:var(--sage); transition:width 0.25s ease; }
  .shop-progress .label { font-size:12px; font-weight:700; color:var(--ink-soft); margin-top:6px; }
  .shop-legend { font-size:11.5px; color:var(--ink-soft); padding:4px 22px 0; line-height:1.5; }
  .week-tabs { display:flex; gap:6px; padding:14px 22px 0; }
  .week-tabs button { flex:1; padding:9px; border-radius:10px; border:1px solid var(--line); background:var(--white); font-size:12.5px; font-weight:700; color:var(--ink-soft); }
  .week-tabs button.active { background:var(--ink); color:var(--paper); border-color:var(--ink); }
  .shop-store { padding:18px 22px 0; }
  .shop-store h4 { font-size:13px; font-weight:800; color:var(--ink); margin:0 0 3px; display:flex; align-items:center; gap:7px; }
  .shop-store .sub { font-size:11px; color:var(--ink-soft); font-weight:600; margin:0 0 10px; }
  .store-dot { width:10px; height:10px; border-radius:50%; }
  .shop-item { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--white); border:1px solid var(--line); border-radius:12px; margin-bottom:7px; }
  .shop-item .check { width:22px; height:22px; border-radius:7px; border:2px solid var(--sage-light); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:13px; color:var(--white); background:var(--white); cursor:pointer; }
  .shop-item.done .check { background:var(--sage); border-color:var(--sage); }
  .shop-item .txt { font-size:14px; flex:1; cursor:pointer; }
  .shop-item .qty { font-weight:700; }
  .shop-item.done .txt { text-decoration:line-through; color:var(--ink-soft); }
  .shop-item .have-btn { background:transparent; border:1px solid var(--line); border-radius:8px; height:30px; padding:0 9px; font-size:11px; font-weight:700; color:var(--ink-soft); display:flex; align-items:center; gap:4px; flex-shrink:0; }
  .shop-item .have-btn.on { background:var(--gold); border-color:var(--gold); color:var(--white); }
  .shop-item .del { background:transparent; border:none; color:var(--ink-soft); font-size:16px; padding:0 4px; flex-shrink:0; }
  .shop-item.have { opacity:0.55; }
  .shop-item.have .txt { color:var(--ink-soft); text-decoration:none; }
  .add-row { display:flex; gap:8px; padding:16px 22px 0; }
  .add-row button { background:var(--sage); color:var(--white); border:none; border-radius:12px; padding:0 18px; font-weight:700; font-size:14px; }
  .custom-note { margin:14px 22px 0; background:var(--paper-2); border-radius:12px; padding:12px 14px; font-size:13px; line-height:1.5; color:var(--ink-soft); }

  /* popup creación */
  .pop-day { padding:14px 22px; border-bottom:1px solid var(--line); }
  .pop-day .pd-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .pop-day .pd-name { font-weight:700; font-size:15px; }
  .pop-day .pd-date { font-size:11.5px; color:var(--ink-soft); font-weight:600; }
  .office-chk { display:flex; align-items:center; gap:7px; font-size:12.5px; font-weight:700; color:var(--ink-soft); background:var(--white); border:1px solid var(--line); border-radius:10px; padding:6px 10px; }
  .office-chk.on { background:var(--blue); border-color:var(--blue); color:var(--white); }
  .office-chk.disabled { opacity:0.5; }
  .pop-line { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .pop-line .pl-label { font-size:12px; font-weight:700; color:var(--ink-soft); width:62px; flex-shrink:0; }
  .pop-opts { display:flex; gap:5px; flex:1; }
  .pop-opts button { flex:1; padding:7px 2px; border-radius:8px; border:1px solid var(--line); background:var(--white); font-size:11px; font-weight:700; color:var(--ink-soft); }
  .pop-opts button.active { background:var(--coral); border-color:var(--coral); color:var(--white); }

  /* dashboard */
  .dash-cards { display:flex; gap:10px; flex-wrap:wrap; }
  .dash-card { flex:1; min-width:46%; background:var(--white); border:1px solid var(--line); border-radius:16px; padding:14px; box-shadow:var(--shadow); }
  .dash-card .v { font-family:'Fraunces',serif; font-size:26px; font-weight:600; }
  .dash-card .v small { font-size:15px; color:var(--ink-soft); }
  .dash-card .l { font-size:11px; text-transform:uppercase; letter-spacing:0.05em; font-weight:700; color:var(--ink-soft); margin-top:2px; }
  .dash-section { margin-top:22px; }
  .dash-section h3 { font-size:13px; text-transform:uppercase; letter-spacing:0.06em; font-weight:800; color:var(--ink-soft); margin:0 0 12px; }
  .split-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .split-row .sr-label { width:70px; font-size:13px; font-weight:700; }
  .split-bar { flex:1; height:24px; background:var(--paper-2); border-radius:8px; overflow:hidden; }
  .split-bar .sfill { height:100%; border-radius:8px; display:flex; align-items:center; justify-content:flex-end; padding-right:8px; color:var(--white); font-size:11px; font-weight:700; }
  .dow-chart { display:flex; align-items:flex-end; gap:6px; height:120px; padding-top:8px; }
  .dow-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end; }
  .dow-bar { width:100%; background:var(--sage); border-radius:6px 6px 0 0; min-height:3px; }
  .dow-lbl { font-size:10px; font-weight:700; color:var(--ink-soft); }
  .dow-val { font-size:10px; font-weight:700; color:var(--sage); }
  .dash-empty { text-align:center; padding:30px 20px; color:var(--ink-soft); font-size:14px; line-height:1.6; }

  /* editor de ingredientes */
  .ed-row { background:var(--white); border:1px solid var(--line); border-radius:12px; padding:10px; margin-bottom:8px; }
  .ed-line { display:flex; gap:6px; align-items:center; margin-bottom:6px; }
  .ed-line:last-child { margin-bottom:0; }
  .ed-name { flex:1; padding:9px 10px; border-radius:9px; border:1px solid var(--line); font-size:14px; font-family:inherit; }
  .ed-qty { width:72px; padding:9px 8px; border-radius:9px; border:1px solid var(--line); font-size:14px; font-family:inherit; }
  .ed-sel { padding:9px 6px; border-radius:9px; border:1px solid var(--line); font-size:13px; font-family:inherit; background:var(--white); }
  .ed-sel.wide { flex:1; }
  .ed-del { width:34px; height:34px; border-radius:9px; border:1px solid var(--line); background:var(--white); color:var(--coral); font-size:15px; flex-shrink:0; }
  .ed-add { width:100%; padding:12px; border-radius:12px; border:1.5px dashed var(--sage-light); background:transparent; color:var(--sage); font-weight:700; font-size:14px; margin-top:4px; }

  /* gastos */

function getRecipeById(id){ return RECIPE_BANK.find(r => r.id === id); }

// ---- fechas ----
function startOfWeek(date){ const d=new Date(date); const day=d.getDay(); const diff=day===0?-6:1-day; d.setDate(d.getDate()+diff); d.setHours(0,0,0,0); return d; }
function fmtDate(d){ return d.toLocaleDateString("es-ES",{day:"numeric",month:"short"}); }
function isSameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function dateKey(d){ return d.toISOString().slice(0,10); }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
// Oficina: válido salvo julio (mes 6) y agosto (mes 7) -> jornada intensiva en casa
function officeAllowed(date){ const m=date.getMonth(); return !(m===6||m===7); }
const DOW_FULL = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
function dayLabel(d){ return DOW_FULL[d.getDay()]; }
function startOfToday(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
// día de la semana elegido más reciente en o antes de 'from'
function mostRecentDow(from, dow){ const d=new Date(from); d.setHours(0,0,0,0); const delta=(d.getDay()-dow+7)%7; return addDays(d,-delta); }
// día de la semana elegido más cercano a 'anchor' (para la próxima semana, ~+7)
function nearestDow(anchor, dow){ const d=new Date(anchor); d.setHours(0,0,0,0); for(let off=0; off<=3; off++){ if(addDays(d,off).getDay()===dow) return addDays(d,off); if(addDays(d,-off).getDay()===dow) return addDays(d,-off); } return d; }

// ---- porciones por persona ----
function personRaw(ing, person){ return Math.round(ing.q * SHARE[ing.r][person]); }
function personsOf(entry){ return entry.diners==="me"?["me"]:entry.diners==="ruben"?["ruben"]:["me","ruben"]; }

function shopQty(ing, persons){
  const eaters = persons.filter(p => ing.dis !== p);
  if(!eaters.length) return 0;
  if(WEIGH(ing.u)){ let g=0; eaters.forEach(p=> g+=ing.q*SHARE[ing.r][p]); return Math.round(g); }
  return Math.max(1, Math.round(ing.q * eaters.length/2));
}

// ---- generador ----
function seededRng(seedStr){ let seed=0; for(let i=0;i<seedStr.length;i++) seed=(seed*31+seedStr.charCodeAt(i))>>>0; return ()=>{ seed=(seed*1664525+1013904223)>>>0; return seed/4294967296; }; }
function shuffle(arr,rng){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function defaultConfig(){ return Array.from({length:7},()=>({office:false,comida:"none",cena:"none"})); }
function dinersFromOut(out){ return out==="yo"?"ruben":out==="ruben"?"me":"both"; }
function recipeCells(plan){ return Object.keys(plan).filter(k=>plan[k]&&plan[k].type==="recipe"); }

function generatePlan(seedStr, weekStart, config){
  const rng = seededRng(seedStr);
  const lunchAll = shuffle(RECIPE_BANK.filter(r=>r.slot==="lunch"), rng);
  const lunchTup = shuffle(RECIPE_BANK.filter(r=>r.slot==="lunch"&&r.tupper), rng);
  const dinnerAll = shuffle(RECIPE_BANK.filter(r=>r.slot==="dinner"), rng);
  const usedL=new Set(), usedD=new Set();
  const Lref={v:0}, LTref={v:0}, Dref={v:0};
  function pull(arr, ref, used){
    for(let k=0;k<arr.length;k++){ const r=arr[(ref.v+k)%arr.length]; if(!used.has(r.id)){ ref.v=(ref.v+k+1)%arr.length; used.add(r.id); return r; } }
    const r=arr[ref.v%arr.length]; ref.v=(ref.v+1)%arr.length; return r;
  }
  const cfg = config || defaultConfig();
  const plan = {};
  for(let d=0; d<7; d++){
    const c = cfg[d] || {office:false,comida:"none",cena:"none"};
    const date = addDays(weekStart, d);
    const offOk = !!c.office && officeAllowed(date);
    if(c.comida==="ambos"){ plan[d+"_lunch"]={type:"eatout"}; }
    else { const r = offOk ? pull(lunchTup,LTref,usedL) : pull(lunchAll,Lref,usedL);
      plan[d+"_lunch"]={type:"recipe", recipeId:r.id, diners:dinersFromOut(c.comida), office:offOk}; }
    if(c.cena==="ambos"){ plan[d+"_dinner"]={type:"eatout"}; }
    else { const r = pull(dinnerAll,Dref,usedD);
      plan[d+"_dinner"]={type:"recipe", recipeId:r.id, diners:dinersFromOut(c.cena)}; }
  }
  ensureFish(plan, rng);
  ensurePuree(plan, rng);
  return plan;
}

function ensureFish(plan, rng){
  // Objetivo: 2 días de pescado a la semana (mínimo 1). Si hay más, se reduce; si hay menos, se añade.
  const TARGET = 2;
  const fishLunch = shuffle(RECIPE_BANK.filter(r=>r.slot==="lunch"&&r.fish), rng);
  const fishLunchTup = fishLunch.filter(r=>r.tupper);
  const fishDinner = shuffle(RECIPE_BANK.filter(r=>r.slot==="dinner"&&r.fish), rng);
  const noFishLunch = shuffle(RECIPE_BANK.filter(r=>r.slot==="lunch"&&!r.fish), rng);
  const noFishLunchTup = noFishLunch.filter(r=>r.tupper);
  const noFishDinner = shuffle(RECIPE_BANK.filter(r=>r.slot==="dinner"&&!r.fish), rng);
  const fishCells = () => recipeCells(plan).filter(k=>{ const r=getRecipeById(plan[k].recipeId); return r&&r.fish; });

  // Añadir pescado si faltan
  let guard=0;
  while(fishCells().length<TARGET && guard++<12){
    const cells = recipeCells(plan).filter(k=>{ const r=getRecipeById(plan[k].recipeId); return r&&!r.fish; })
      .sort((a,b)=> (a.endsWith("dinner")?0:1)-(b.endsWith("dinner")?0:1));
    let done=false;
    for(const k of cells){
      const isLunch = k.endsWith("lunch");
      const pool = isLunch ? (plan[k].office?fishLunchTup:fishLunch) : fishDinner;
      const have = new Set(recipeCells(plan).map(c=>plan[c].recipeId));
      const cand = pool.find(r=>!have.has(r.id)) || pool[0];
      if(cand){ plan[k]={...plan[k], recipeId:cand.id}; done=true; break; }
    }
    if(!done) break;
  }
  // Quitar pescado de más (dejar TARGET)
  guard=0;
  while(fishCells().length>TARGET && guard++<12){
    const k = fishCells()[fishCells().length-1];
    const isLunch = k.endsWith("lunch");
    const pool = isLunch ? (plan[k].office?noFishLunchTup:noFishLunch) : noFishDinner;
    const have = new Set(recipeCells(plan).map(c=>plan[c].recipeId));
    const cand = pool.find(r=>!have.has(r.id)) || pool[0];
    if(cand){ plan[k]={...plan[k], recipeId:cand.id}; } else break;
  }
}
function ensurePuree(plan, rng){
  const dinners = recipeCells(plan).filter(k=>k.endsWith("dinner"));
  if(dinners.some(k=>{ const r=getRecipeById(plan[k].recipeId); return r&&r.isPuree; })) return;
  const purees = shuffle(RECIPE_BANK.filter(r=>r.slot==="dinner"&&r.isPuree), rng);
  if(!purees.length) return;
  const target = dinners.find(k=>{ const r=getRecipeById(plan[k].recipeId); return r&&!r.fish; }) || dinners[0];
  if(target){ const have=new Set(recipeCells(plan).map(c=>plan[c].recipeId)); const cand=purees.find(r=>!have.has(r.id))||purees[0]; plan[target]={...plan[target], recipeId:cand.id}; }
}

const DATA_KEYS = ["menu_weeks_v4", "menu_log_v4", "menu_expenses_v4"];

// Copia en memoria de los datos. La app lee de aquí (rápido) y cada cambio
// se escribe en la nube en segundo plano.
const cache = {};

// Carga TODOS los datos una vez (al entrar). Si no hay Supabase configurado,
// carga desde el navegador.
async function loadAll(){
  DATA_KEYS.forEach(k => { cache[k] = undefined; });
  if (!sb){
    DATA_KEYS.forEach(k => { try { const v=localStorage.getItem(k); cache[k]=v?JSON.parse(v):undefined; } catch(e){} });
    return;
  }
  try {
    // App pública: leemos todas las cajas (una por key) y nos quedamos con la
    // versión MÁS RECIENTE de cada una (por si quedaran filas antiguas).
    const { data, error } = await sb.from("kv").select("key,data,updated_at")
      .order("updated_at", { ascending: true, nullsFirst: true });
    if (!error && data){ data.forEach(row => { cache[row.key] = row.data; }); }
  } catch(e){ console.error("No se pudieron cargar los datos", e); }
}

// Guardado en la nube con un pequeño retardo, para no saturar con cada tecla.
const _timers = {};
function pushToCloud(k){
  if (!sb) return;
  clearTimeout(_timers[k]);
  _timers[k] = setTimeout(async () => {
    try {
      await sb.from("kv").upsert({ key: k, data: cache[k], updated_at: new Date().toISOString() }, { onConflict: "key" });
    } catch(e){ console.error("No se pudo guardar en la nube:", k, e); }
  }, 600);
}

const store = {
  get(k, fb){ const v = cache[k]; return (v===undefined || v===null) ? fb : v; },
  set(k, v){
    cache[k] = v;
    if (sb) pushToCloud(k);
    else { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} }
  }
};
function makeWeek(start, salt, config){
  const key = dateKey(start);
  const cfg = config || defaultConfig();
  return { key, start:start.toISOString(), salt:salt||0, config:cfg, plan:generatePlan(key+":"+(salt||0), start, cfg), shopping:{checked:{},have:{},removed:{},extra:[],notes:""} };
}

  function patch(id, p){ setRows(rs=>rs.map(r=>r.id===id?{...r,...p}:r)); }
  function add(){ setRows(rs=>rs.concat([{id:rid(),type:"O",name:"",qty:"",unit:"g",store:"mercadona"}])); }
  function remove(id){ setRows(rs=>rs.filter(r=>r.id!==id)); }
  function build(){
    return rows.filter(r=>r.name.trim()).map(r=>{
      if(r.type==="staple") return { staple:true, d:r.name.trim(), items:[r.name.trim()] };
      const q = parseFloat(String(r.qty).replace(",","."))||0;
      const ul = UNIT_LABEL[r.unit]||r.unit;
      const d = r.unit==="ud" ? `${q} ${r.name.trim()}` : `${q} ${ul} de ${r.name.trim()}`;
      return { d, n:r.name.trim(), q, u:r.unit, r:r.type, s:r.store, ck:r.ck };
    });
  }
  return (
    <div className="sheet-section" style={{paddingBottom:8}}>
      <h3>Editar ingredientes</h3>
      <div className="note-box tip" style={{marginBottom:12}}>Quita o añade ingredientes. Los cambios se reflejan en esta receta y en la lista de la compra.</div>
      {rows.map(r=>(
        <div className="ed-row" key={r.id}>
          <div className="ed-line">
            <input className="ed-name" type="text" placeholder="Ingrediente" value={r.name} onChange={e=>patch(r.id,{name:e.target.value})} />
            <button className="ed-del" onClick={()=>remove(r.id)} aria-label="Quitar">✕</button>
          </div>
          <div className="ed-line">
            <select className="ed-sel" value={r.type} onChange={e=>patch(r.id,{type:e.target.value})}>
              {TYPES.map(([v,l])=><option key={v} value={v}>{l}</option>)}
            </select>
            {r.type!=="staple" && <input className="ed-qty" type="number" inputMode="decimal" placeholder="Cant." value={r.qty} onChange={e=>patch(r.id,{qty:e.target.value})} />}
            {r.type!=="staple" && <select className="ed-sel" value={r.unit} onChange={e=>patch(r.id,{unit:e.target.value})}>{UNITS.map(u=><option key={u} value={u}>{UNIT_LABEL[u]||u}</option>)}</select>}
          </div>
          {r.type!=="staple" && (
            <div className="ed-line">
              <select className="ed-sel wide" value={r.store} onChange={e=>patch(r.id,{store:e.target.value})}>{STORES.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>
            </div>
          )}
        </div>
      ))}
      <button className="ed-add" onClick={add}>＋ Añadir ingrediente</button>
      <div className="action-row" style={{padding:0,marginTop:14}}>
        <button className="action-btn" onClick={onCancel}>Cancelar</button>
        <button className="action-btn primary" onClick={()=>onSave(build())}>Guardar</button>
      </div>
    </div>
  );
}

function buildShopping(plan){
  const agg={}, customs=[];
  Object.values(plan).forEach(entry=>{
    if(!entry) return;
    if(entry.type==="recipe"){
      const r=getRecipeById(entry.recipeId); if(!r) return;
      const persons = personsOf(entry);
      const ings = (entry.ingredients && entry.ingredients.length) ? entry.ingredients : r.ingredients;
      ings.forEach(ing=>{
        if(ing.staple){ (ing.items||[]).forEach(n=>{ const k="s__"+n; if(!agg[k]) agg[k]={key:k,name:n,staple:true,store:"mercadona"}; }); return; }
        const q = shopQty(ing, persons); if(q<=0) return;
        const k = ing.n+"__"+ing.u;
        if(!agg[k]) agg[k]={key:k,name:ing.n,unit:ing.u,qty:0,store:ing.s};
        agg[k].qty += q;
      });
    } else if(entry.type==="custom"){ customs.push(entry.name||"Comida personalizada"); }
  });
  return { items:Object.values(agg), customs };
}

function Dashboard({ log, weeks }) {
  const entries = Object.entries(log).filter(([,v])=>v).map(([k])=>{ const i=k.lastIndexOf("_"); return { date:k.slice(0,i), slot:k.slice(i+1) }; });
  const total = entries.length;
  const lunch = entries.filter(e=>e.slot==="lunch").length;
  const dinner = entries.filter(e=>e.slot==="dinner").length;
  const now = new Date();
  const monthCount = entries.filter(e=>{ const d=new Date(e.date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); }).length;
  const wkStart = startOfWeek(now), wkEnd = addDays(wkStart,7);
  const weekEntries = entries.filter(e=>{ const d=new Date(e.date); return d>=wkStart && d<wkEnd; });
  // planificado esta semana (no eatout) en la semana actual guardada
  const curWeek = weeks.find(w=>w.key===dateKey(wkStart));
  let plannedWeek = 0;
  if (curWeek) Object.values(curWeek.plan).forEach(e=>{ if(e && (e.type==="recipe"||e.type==="custom")) plannedWeek++; });
  const rateWeek = plannedWeek ? Math.round(weekEntries.length/plannedWeek*100) : 0;
  // por día de la semana
  const dow = [0,0,0,0,0,0,0];
  entries.forEach(e=>{ const d=new Date(e.date); const idx=(d.getDay()===0)?6:d.getDay()-1; dow[idx]++; });
  const maxDow = Math.max(1, ...dow);
  const lunchPct = total ? Math.round(lunch/total*100) : 0;
  const dinnerPct = total ? Math.round(dinner/total*100) : 0;

  if (total===0) {
    return <div className="dash-empty">Aún no has marcado ninguna comida como cumplida.<br/>Marca "Cumplí" en las comidas del calendario y aquí verás tus estadísticas.</div>;
  }
  return (
    <div>
      <div className="dash-cards">
        <div className="dash-card"><div className="v">{weekEntries.length}{plannedWeek?<small>/{plannedWeek}</small>:null}</div><div className="l">Cumplido esta semana{plannedWeek?` · ${rateWeek}%`:""}</div></div>
        <div className="dash-card"><div className="v">{monthCount}</div><div className="l">Este mes</div></div>
        <div className="dash-card"><div className="v">{total}</div><div className="l">Total cumplidas</div></div>
        <div className="dash-card"><div className="v">{lunch}<small> / {dinner}</small></div><div className="l">Comidas / Cenas</div></div>
      </div>

      <div className="dash-section">
        <h3>Por tipo de comida</h3>
        <div className="split-row"><span className="sr-label">Comidas</span><div className="split-bar"><div className="sfill" style={{width:Math.max(lunchPct,8)+"%",background:"var(--coral)"}}>{lunch}</div></div></div>
        <div className="split-row"><span className="sr-label">Cenas</span><div className="split-bar"><div className="sfill" style={{width:Math.max(dinnerPct,8)+"%",background:"var(--blue)"}}>{dinner}</div></div></div>
      </div>

      <div className="dash-section">
        <h3>Por día de la semana</h3>
        <div className="dow-chart">
          {dow.map((v,i)=>(
            <div className="dow-col" key={i}>
              <span className="dow-val">{v||""}</span>
              <div className="dow-bar" style={{height:(v/maxDow*100)+"%"}}></div>
              <span className="dow-lbl">{DAY_NAMES[i].slice(0,1)}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ExpensesView({ expenses, onAdd, onDelete }) {
  const [store2, setStore2] = useState("mercadona");
  const [amount, setAmount] = useState("");
  const [date, setDate] = useState(dateKey(new Date()));
  const [mode, setMode] = useState("week"); // week | month
  const [offset, setOffset] = useState(0);

  function add(){
    const a = parseFloat(String(amount).replace(",","."));
    if(!a || a<=0) return;
    onAdd({ id:Date.now()+"", store:store2, amount:Math.round(a*100)/100, date });
    setAmount("");
  }

  const now = new Date();
  let rangeStart, rangeEnd, label;
  if(mode==="week"){
    rangeStart = addDays(startOfWeek(now), offset*7);
    rangeEnd = addDays(rangeStart, 7);
    label = `${fmtDate(rangeStart)} – ${fmtDate(addDays(rangeStart,6))}`;
  } else {
    const base = new Date(now.getFullYear(), now.getMonth()+offset, 1);
    rangeStart = base;
    rangeEnd = new Date(base.getFullYear(), base.getMonth()+1, 1);
    label = base.toLocaleDateString("es-ES",{month:"long",year:"numeric"});
  }
  const inRange = expenses.filter(e=>{ const d=new Date(e.date+"T00:00:00"); return d>=rangeStart && d<rangeEnd; })
    .sort((a,b)=> a.date<b.date?1:-1);
  const total = inRange.reduce((s,e)=>s+e.amount,0);
  const byStore = {};
  STORE_ORDER.forEach(s=>byStore[s]=0);
  inRange.forEach(e=>{ byStore[e.store]=(byStore[e.store]||0)+e.amount; });
  const maxStore = Math.max(1, ...STORE_ORDER.map(s=>byStore[s]));
  const eur = (n)=> n.toFixed(2).replace(".",",")+" €";

  return (
    <div>
      <div className="exp-add">
        <h3>Añadir gasto</h3>
        <div className="store-pick">
          {STORE_ORDER.map(s=>{
            const info=STORE_INFO[s];
            return <button key={s} className={store2===s?"active":""} style={store2===s?{background:info.color}:{}} onClick={()=>setStore2(s)}>{info.label}</button>;
          })}
        </div>
        <div className="exp-fields">
          <input className="amount" type="number" inputMode="decimal" placeholder="Importe €" value={amount} onChange={e=>setAmount(e.target.value)} />
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} />
        </div>
        <button className="add-exp-btn" onClick={add}>Añadir gasto</button>
      </div>

      <div className="period-nav">
        <div className="seg2">
          <button className={mode==="week"?"active":""} onClick={()=>{setMode("week");setOffset(0);}}>Semana</button>
          <button className={mode==="month"?"active":""} onClick={()=>{setMode("month");setOffset(0);}}>Mes</button>
        </div>
        <div className="period-label">
          <button onClick={()=>setOffset(o=>o-1)} aria-label="Anterior">‹</button>
          <span className="pl-txt">{label}</span>
          <button onClick={()=>setOffset(o=>Math.min(0,o+1))} aria-label="Siguiente">›</button>
        </div>
      </div>

      <div className="exp-total"><div className="v">{eur(total)}</div><div className="l">Total {mode==="week"?"de la semana":"del mes"}</div></div>

      {STORE_ORDER.map(s=>{
        const info=STORE_INFO[s]; const v=byStore[s]||0;
        return (
          <div className="exp-store-row" key={s}>
            <span className="esr-label"><span className="store-dot" style={{background:info.color}}></span>{info.label}</span>
            <div className="esr-bar"><div className="esr-fill" style={{width:(v/maxStore*100)+"%",background:info.color}}></div></div>
            <span className="esr-val">{eur(v)}</span>
          </div>
        );
      })}

      <div className="dash-section">
        <h3>Movimientos</h3>
        {inRange.length===0 && <div className="dash-empty" style={{padding:"20px"}}>No hay gastos en este periodo.</div>}
        {inRange.map(e=>{
          const info=STORE_INFO[e.store];
          const d=new Date(e.date+"T00:00:00");
          return (
            <div className="exp-list-item" key={e.id}>
              <span className="eli-dot" style={{background:info.color}}></span>
              <div className="eli-store">{info.label}<div className="eli-date">{d.toLocaleDateString("es-ES",{day:"numeric",month:"short"})}</div></div>
              <span className="eli-amount">{eur(e.amount)}</span>
              <button className="del" onClick={()=>onDelete(e.id)} aria-label="Eliminar">✕</button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function App() {
  const today = new Date();
  const [view, setView] = useState("menu");
  const [weeks, setWeeks] = useState(()=>{ const s=store.get("menu_weeks_v4",null); return (s&&s.length)?s:[makeWeek(startOfWeek(today),0)]; });
  const [log, setLog] = useState(()=>store.get("menu_log_v4",{}));
  const [expenses, setExpenses] = useState(()=>store.get("menu_expenses_v4",[]));
  const [activeWeekIdx, setActiveWeekIdx] = useState(0);
  const [activeMeal, setActiveMeal] = useState(null);
  const [showCart, setShowCart] = useState(false);
  const [showSetup, setShowSetup] = useState(null); // null | {mode:'create'|'regen', weekKey?}

  useEffect(()=>{ store.set("menu_weeks_v4", weeks); }, [weeks]);
  useEffect(()=>{ store.set("menu_log_v4", log); }, [log]);
  useEffect(()=>{ store.set("menu_expenses_v4", expenses); }, [expenses]);

  function updateEntry(weekKey, cell, ne){
    setWeeks(ws=>ws.map(w=>{ if(w.key!==weekKey) return w; const plan={...w.plan}; if(ne===null) delete plan[cell]; else plan[cell]=ne; return {...w,plan}; }));
  }
  function patchEntry(weekKey, cell, patch){
    setWeeks(ws=>ws.map(w=>{ if(w.key!==weekKey) return w; const e=w.plan[cell]; if(!e) return w; return {...w,plan:{...w.plan,[cell]:{...e,...patch}}}; }));
  }
  function toggleOffice(weekKey, cell){
    setWeeks(ws=>ws.map(w=>{ if(w.key!==weekKey) return w; const e=w.plan[cell]; if(!e||e.type==="eatout") return w; return {...w,plan:{...w.plan,[cell]:{...e,office:!e.office}}}; }));
  }
  function cycleDiners(weekKey, cell){
    setWeeks(ws=>ws.map(w=>{ if(w.key!==weekKey) return w; const e=w.plan[cell]; if(!e||e.type==="eatout") return w; const order={both:"me",me:"ruben",ruben:"both"}; return {...w,plan:{...w.plan,[cell]:{...e,diners:order[e.diners||"both"]}}}; }));
  }
  function toggleComplied(dateISO, slot){
    const k=dateISO+"_"+slot; setLog(l=>{ const n={...l}; if(n[k]) delete n[k]; else n[k]=true; return n; });
  }
  function regenWeek(weekKey){
    setWeeks(ws=>ws.map(w=>{ if(w.key!==weekKey) return w; const salt=(w.salt||0)+1; return {...w,salt,plan:generatePlan(w.key+":"+salt,new Date(w.start),w.config),shopping:{checked:{},have:{},extra:[]}}; }));
  }
  function addExpense(e){ setExpenses(xs=>xs.concat([e])); }
  function deleteExpense(id){ setExpenses(xs=>xs.filter(e=>e.id!==id)); }
  function confirmSetup(startDate, cfg){
    if(!showSetup) return;
    if(showSetup.mode==="create"){
      setWeeks(ws=>{ if(ws.length>=2) return ws; return ws.concat([makeWeek(startDate,0,cfg)]); });
      setActiveWeekIdx(1);
    } else {
      const wk = weeks.find(x=>x.key===showSetup.weekKey);
      const salt = wk ? (wk.salt||0)+1 : 0;
      setWeeks(ws=>ws.map(x=> x.key===showSetup.weekKey ? makeWeek(startDate, salt, cfg) : x));
    }
    setShowSetup(null);
  }
  function updateShopping(weekKey, shopping){ setWeeks(ws=>ws.map(w=>w.key===weekKey?{...w,shopping}:w)); }

  const safeIdx = Math.min(activeWeekIdx, weeks.length-1);
  const w = weeks[safeIdx];
  const wStart = new Date(w.start), wEnd = addDays(wStart,6);

  function openMeal(week, dayIdx, slot){
    const cell=dayIdx+"_"+slot.key;
    setActiveMeal({ weekKey:week.key, cell, slotKey:slot.key, slotLabel:slot.label, dayName:DAY_NAMES[dayIdx], entry:week.plan[cell]||null });
  }

  return (
    <div>
      <header className="app-header">
        <div className="header-top">
          <div><p className="eyebrow">Tú y Rubén</p><h1 className="display">Menú semanal</h1></div>
          <button className="cart-btn" onClick={()=>setShowCart(true)} aria-label="Lista de la compra">🛒</button>
        </div>
        <div className="nav-tabs">
          <button className={view==="menu"?"active":""} onClick={()=>setView("menu")}>Menú</button>
          <button className={view==="gastos"?"active":""} onClick={()=>setView("gastos")}>Gastos</button>
          <button className={view==="dash"?"active":""} onClick={()=>setView("dash")}>Progreso</button>
        </div>
      </header>

      <main className="content">
        {view==="menu" ? (
          <React.Fragment>
            {weeks.length===2 && (
              <div className="week-pager">{weeks.map((wk,i)=>(<button key={wk.key} className={i===safeIdx?"active":""} onClick={()=>setActiveWeekIdx(i)}>{i===0?"Esta semana":"Próxima semana"}</button>))}</div>
            )}
            <div className="week-subhead">
              <div><div className="wk-name">{safeIdx===0?"Esta semana":"Próxima semana"}</div><div className="wk-range">{fmtDate(wStart)} – {fmtDate(wEnd)}</div></div>
              <button className="regen-btn" onClick={()=>setShowSetup({mode:"regen", weekKey:w.key})}>↻ Regenerar</button>
            </div>
            {Array.from({length:7}).map((_,dayIdx)=>{
              const dDate=addDays(wStart,dayIdx); const isToday=isSameDay(dDate,today);
              const isPast=dDate<startOfToday() && !isToday; const dISO=dateKey(dDate);
              return (
                <div className={"day-block"+(isToday?" is-today":"")+(isPast?" is-past":"")} key={dayIdx}>
                  <div className="day-heading">
                    <span className="day-name">{dayLabel(dDate)}</span>
                    <span className="day-date">{fmtDate(dDate)}</span>
                    {isToday && <span className="today-pill">Hoy</span>}
                    {isPast && <span className="past-pill">Pasado</span>}
                  </div>
                  <div className="meal-row">
                    {SLOTS.map(slot=>(
                      <MealCard key={slot.key}
                        entry={w.plan[dayIdx+"_"+slot.key]||null}
                        slotKey={slot.key} slotLabel={slot.label} dateISO={dISO} date={dDate}
                        complied={!!log[dISO+"_"+slot.key]}
                        onOpen={()=>openMeal(w,dayIdx,slot)}
                        onToggleOffice={()=>toggleOffice(w.key,dayIdx+"_"+slot.key)}
                        onCycleDiners={()=>cycleDiners(w.key,dayIdx+"_"+slot.key)}
                        onToggleComplied={()=>toggleComplied(dISO,slot.key)} />
                    ))}
                  </div>
                </div>
              );
            })}
            {weeks.length<2
              ? <button className="create-btn" onClick={()=>setShowSetup({mode:"create"})}>＋ Crear menú de la próxima semana</button>
              : <button className="create-btn disabled" disabled>Ya tienes 2 semanas planificadas</button>}
          </React.Fragment>
        ) : view==="gastos" ? (
          <ExpensesView expenses={expenses} onAdd={addExpense} onDelete={deleteExpense} />
        ) : (
          <Dashboard log={log} weeks={weeks} />
        )}
      </main>

      {activeMeal && <MealSheet context={activeMeal}
        onClose={()=>setActiveMeal(null)}
        onUpdate={updateEntry}
        onPatch={(patch)=>{ patchEntry(activeMeal.weekKey, activeMeal.cell, patch); setActiveMeal(am=>am?{...am,entry:{...am.entry,...patch}}:am); }} />}
      {showCart && <ShoppingSheet weeks={weeks} initialWeekKey={w.key} onClose={()=>setShowCart(false)} onUpdateShopping={updateShopping} />}
      {showSetup && (()=>{
        const isCreate = showSetup.mode==="create";
        const anchor = addDays(new Date(weeks[weeks.length-1].start),7);
        const setupWeek = isCreate ? null : weeks.find(x=>x.key===showSetup.weekKey);
        const computeStart = isCreate ? (dow)=>nearestDow(anchor, dow) : (dow)=>mostRecentDow(today, dow);
        const initialDow = isCreate ? anchor.getDay() : (setupWeek ? new Date(setupWeek.start).getDay() : today.getDay());
        const initialConfig = (!isCreate && setupWeek) ? setupWeek.config : defaultConfig();
        return <WeekSetupPopup
          eyebrow={isCreate?"Próxima semana":"Regenerar semana"}
          title={isCreate?"Crear menú":"Regenerar menú"}
          confirmLabel={isCreate?"Generar menú":"Regenerar"}
          computeStart={computeStart} initialDow={initialDow} initialConfig={initialConfig}
          onConfirm={confirmSetup} onCancel={()=>setShowSetup(null)} />;
      })()}
    </div>
  );
}

function Splash({ text }){
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",
      flexDirection:"column",gap:14,background:"var(--paper)",color:"var(--ink-soft)"}}>
      <div style={{width:34,height:34,border:"3px solid var(--line)",borderTopColor:"var(--sage)",
        borderRadius:"50%",animation:"spin 0.8s linear infinite"}}></div>
      <div style={{fontWeight:600,fontSize:14}}>{text||"Cargando…"}</div>
      <style>{"@keyframes spin{to{transform:rotate(360deg)}}"}</style>
    </div>
  );
}

function Root(){
  // App pública: sin login. Cargamos los datos directamente y mostramos la app.
  const [ready, setReady] = useState(false);

  useEffect(() => {
    loadAll().then(()=> setReady(true));
  }, []);

  if (!ready) return <Splash text="Cargando tu menú…" />;
  return <App />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
